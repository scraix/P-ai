name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本号（例如 v0.2.8），仅发布时必填"
        required: false
        type: string
      publish_release:
        description: "是否发布到 GitHub Release"
        required: true
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  NODE_VERSION: "20"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libgbm-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            librsvg2-dev \
            patchelf

      - name: Validate version consistency
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAURI_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [ "$PKG_VERSION" != "$TAURI_VERSION" ]; then
            echo "Version mismatch: package.json=$PKG_VERSION, tauri.conf.json=$TAURI_VERSION"
            exit 1
          fi

          EXPECTED_TAG="v$PKG_VERSION"
          echo "EXPECTED_TAG=$EXPECTED_TAG" >> $GITHUB_ENV

          if [ "${{ github.event_name }}" = "push" ]; then
            if [ "${{ github.ref_name }}" != "$EXPECTED_TAG" ]; then
              echo "Tag/version mismatch: tag=${{ github.ref_name }}, expected=$EXPECTED_TAG"
              exit 1
            fi
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            if [ "${{ inputs.version }}" != "$EXPECTED_TAG" ]; then
              echo "Manual input version mismatch: input=${{ inputs.version }}, expected=$EXPECTED_TAG"
              exit 1
            fi
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri build

      - name: List packaged artifacts (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          echo "=== release bundle files ==="
          find src-tauri/target/release/bundle -type f \( -name "*.deb" -o -name "*.AppImage" \) | sort

      - name: List packaged artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "=== release bundle files ==="
          @(
            Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -File -Include *.msi,*-setup.exe -ErrorAction SilentlyContinue
            Get-Item src-tauri/target/release/easy-call-ai.exe -ErrorAction SilentlyContinue
          ) |
            Where-Object { $_ } |
            Sort-Object FullName |
            ForEach-Object { $_.FullName }

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*-setup.exe
            src-tauri/target/release/easy-call-ai.exe
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release == true)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            if [ -z "${{ inputs.version }}" ]; then
              echo "workflow_dispatch 发布时必须填写 version，例如 v0.2.8"
              exit 1
            fi
            echo "name=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Create tag for manual release (if missing)
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG_NAME="${{ steps.tag.outputs.name }}"
          git fetch --tags
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists"
          else
            git tag "$TAG_NAME" "${{ github.sha }}"
            git push origin "$TAG_NAME"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            release-assets/**/*.deb
            release-assets/**/*.AppImage
            release-assets/**/*.msi
            release-assets/**/*-setup.exe
            release-assets/**/easy-call-ai.exe
