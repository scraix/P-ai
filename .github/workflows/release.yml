name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本号（例如 v0.9.0），仅发布时必填"
        required: false
        type: string
      publish_release:
        description: "是否发布到 GitHub Release"
        required: true
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  NODE_VERSION: "20"

jobs:
  build_windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate version consistency
        shell: pwsh
        run: |
          $pkgVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $tauriVersion = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          if ($pkgVersion -ne $tauriVersion) {
            throw "Version mismatch: package.json=$pkgVersion, tauri.conf.json=$tauriVersion"
          }

          $expectedTag = "v$pkgVersion"
          "EXPECTED_TAG=$expectedTag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PACKAGE_VERSION=$pkgVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          if ("${{ github.event_name }}" -eq "push" -and "${{ github.ref_name }}" -ne $expectedTag) {
            throw "Tag/version mismatch: tag=${{ github.ref_name }}, expected=$expectedTag"
          }

          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.version }}" -and "${{ inputs.version }}" -ne $expectedTag) {
            throw "Manual input version mismatch: input=${{ inputs.version }}, expected=$expectedTag"
          }

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate signing secrets early
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
        run: |
          $ErrorActionPreference = "Stop"

          $privateKey = "$env:TAURI_SIGNING_PRIVATE_KEY".Trim()
          $publicKey = "$env:TAURI_UPDATER_PUBLIC_KEY".Trim()
          $config = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $configPubkey = "$($config.plugins.updater.pubkey)".Trim()

          if ([string]::IsNullOrWhiteSpace($privateKey)) {
            throw "缺少 TAURI_SIGNING_PRIVATE_KEY secret。"
          }
          if ([string]::IsNullOrWhiteSpace($publicKey)) {
            throw "缺少 TAURI_UPDATER_PUBLIC_KEY secret。"
          }
          if ($publicKey -ne $configPubkey) {
            throw "TAURI_UPDATER_PUBLIC_KEY 与 src-tauri/tauri.conf.json 中的 updater.pubkey 不一致。"
          }

          try {
            [void][Convert]::FromBase64String($publicKey)
          } catch {
            throw "TAURI_UPDATER_PUBLIC_KEY 不是合法 base64。"
          }

          $signProbePath = Join-Path $env:RUNNER_TEMP "sign-probe.txt"
          Set-Content -LiteralPath $signProbePath -Value "sign-probe" -Encoding ascii -NoNewline

          try {
            pnpm exec tauri signer sign $signProbePath | Out-Null
            if ($LASTEXITCODE -ne 0) {
              throw "pnpm tauri signer sign 退出码异常：$LASTEXITCODE"
            }
            Write-Host "[ok] 签名预检通过"
          } catch {
            throw "签名预检失败，请检查私钥、密码、公钥是否匹配。"
          } finally {
            Remove-Item -LiteralPath $signProbePath -ErrorAction SilentlyContinue
          }

      - name: Build Tauri app
        run: pnpm tauri build --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}

      - name: Build updater manifests
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          function Get-TauriPublicSignature {
            param(
              [Parameter(Mandatory = $true)]
              [string]$ArtifactPath
            )

            $outputLines = @(pnpm exec tauri signer sign $ArtifactPath 2>&1)
            if ($LASTEXITCODE -ne 0) {
              $outputText = ($outputLines | ForEach-Object { "$_" }) -join "`n"
              throw "tauri signer sign 执行失败：$outputText"
            }

            $captureNext = $false
            foreach ($line in $outputLines) {
              $trimmed = "$line".Trim()
              if ($captureNext -and -not [string]::IsNullOrWhiteSpace($trimmed)) {
                return $trimmed
              }
              if ($trimmed -eq "Public signature:") {
                $captureNext = $true
              }
            }

            $compact = (($outputLines | ForEach-Object { "$_" }) -join "").Trim()
            if ($compact -match '^[A-Za-z0-9+/=]+$') {
              return $compact
            }

            $fullOutput = ($outputLines | ForEach-Object { "$_" }) -join "`n"
            throw "未能从 tauri signer 输出中提取纯签名字符串：$fullOutput"
          }

          function New-TauriUpdaterManifest {
            param(
              [Parameter(Mandatory = $true)]
              [string]$Version,
              [Parameter(Mandatory = $true)]
              [string]$Notes,
              [Parameter(Mandatory = $true)]
              [string]$Target,
              [Parameter(Mandatory = $true)]
              [string]$Signature,
              [Parameter(Mandatory = $true)]
              [string]$Url
            )

            return @{
              version = $Version
              notes = $Notes
              pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ss.fffZ")
              platforms = @{
                $Target = @{
                  signature = $Signature
                  url = $Url
                }
              }
            } | ConvertTo-Json -Depth 8
          }

          $packageVersion = $env:PACKAGE_VERSION
          $tagName = "v$packageVersion"
          $bundleRoot = "src-tauri/target/release/bundle"

          $installerTarget = "windows-x86_64"
          $installerOutDir = Join-Path $bundleRoot "nsis"
          $installerManifestPath = Join-Path $installerOutDir "latest.json"
          New-Item -ItemType Directory -Path $installerOutDir -Force | Out-Null

          $installerExe = Get-ChildItem -Path $bundleRoot -Recurse -File |
            Where-Object { $_.Name -like "*-setup.exe" } |
            Select-Object -First 1
          if (-not $installerExe) {
            throw "未找到安装版 setup.exe，无法生成 latest.json"
          }
          $installerSigPath = "$($installerExe.FullName).sig"
          if (-not (Test-Path $installerSigPath)) {
            throw "未找到安装版签名文件：$installerSigPath"
          }
          $installerSignature = (Get-Content -LiteralPath $installerSigPath -Raw).Trim()
          if ([string]::IsNullOrWhiteSpace($installerSignature)) {
            throw "安装版签名文件为空：$installerSigPath"
          }
          $installerManifest = New-TauriUpdaterManifest `
            -Version $packageVersion `
            -Notes "Installer update package for $tagName" `
            -Target $installerTarget `
            -Signature $installerSignature `
            -Url "https://github.com/${{ github.repository }}/releases/download/$tagName/$($installerExe.Name)"
          Set-Content -LiteralPath $installerManifestPath -Value $installerManifest -Encoding utf8

          $portableName = "p-ai-windows-$tagName-x64-portable.zip"
          $portableTarget = "windows-x86_64-portable"
          $portableWorkDir = Join-Path $env:RUNNER_TEMP "portable-package"
          $portableOutDir = Join-Path $bundleRoot "portable"
          $portableZipPath = Join-Path $portableOutDir $portableName
          $portableSigPath = "$portableZipPath.sig"
          $portableManifestPath = Join-Path $portableOutDir "latest-portable.json"

          if (Test-Path $portableWorkDir) {
            Remove-Item -LiteralPath $portableWorkDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $portableWorkDir | Out-Null
          New-Item -ItemType Directory -Path $portableOutDir -Force | Out-Null

          Copy-Item -LiteralPath "src-tauri/target/release/p-ai.exe" -Destination (Join-Path $portableWorkDir "p-ai.exe") -Force
          New-Item -ItemType File -Path (Join-Path $portableWorkDir "PORTABLE") -Force | Out-Null

          if (Test-Path $portableZipPath) {
            Remove-Item -LiteralPath $portableZipPath -Force
          }
          Compress-Archive -Path (Join-Path $portableWorkDir "*") -DestinationPath $portableZipPath -Force

          $signature = Get-TauriPublicSignature -ArtifactPath $portableZipPath
          if ([string]::IsNullOrWhiteSpace($signature)) {
            throw "Portable signature is empty"
          }
          Set-Content -LiteralPath $portableSigPath -Value $signature -Encoding ascii -NoNewline

          $manifest = New-TauriUpdaterManifest `
            -Version $packageVersion `
            -Notes "Portable update package for $tagName" `
            -Target $portableTarget `
            -Signature $signature `
            -Url "https://github.com/${{ github.repository }}/releases/download/$tagName/$portableName"
          Set-Content -LiteralPath $portableManifestPath -Value $manifest -Encoding utf8

      - name: List packaged artifacts
        shell: pwsh
        run: |
          Write-Host "=== release bundle files ==="
          Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -File |
            Sort-Object FullName |
            ForEach-Object { $_.FullName }

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-windows
          path: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.zip
            src-tauri/target/release/bundle/**/*.sig
            src-tauri/target/release/bundle/**/latest*.json
          if-no-files-found: error

  build_linux:
    name: Build Linux
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libgbm-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - name: Validate version consistency
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAURI_VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          if [ "$PKG_VERSION" != "$TAURI_VERSION" ]; then
            echo "Version mismatch: package.json=$PKG_VERSION, tauri.conf.json=$TAURI_VERSION"
            exit 1
          fi

          EXPECTED_TAG="v$PKG_VERSION"
          echo "EXPECTED_TAG=$EXPECTED_TAG" >> "$GITHUB_ENV"
          echo "PACKAGE_VERSION=$PKG_VERSION" >> "$GITHUB_ENV"

          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_name }}" != "$EXPECTED_TAG" ]; then
            echo "Tag/version mismatch: tag=${{ github.ref_name }}, expected=$EXPECTED_TAG"
            exit 1
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ] && [ "${{ inputs.version }}" != "$EXPECTED_TAG" ]; then
            echo "Manual input version mismatch: input=${{ inputs.version }}, expected=$EXPECTED_TAG"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app for Linux
        run: pnpm tauri build --bundles deb,appimage

      - name: List packaged artifacts
        run: |
          echo "=== release bundle files ==="
          find src-tauri/target/release/bundle -type f | sort

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-linux
          path: |
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.appimage
          if-no-files-found: error

  release:
    name: Publish Release
    needs: [build_windows, build_linux]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release == true)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            if [ -z "${{ inputs.version }}" ]; then
              echo "workflow_dispatch 发布时必须填写 version，例如 v0.9.0"
              exit 1
            fi
            echo "name=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag for manual release (if missing)
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG_NAME="${{ steps.tag.outputs.name }}"
          git fetch --tags
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists"
          else
            git tag "$TAG_NAME" "${{ github.sha }}"
            git push origin "$TAG_NAME"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            release-assets/**/*.exe
            release-assets/**/*.zip
            release-assets/**/*.deb
            release-assets/**/*.AppImage
            release-assets/**/*.appimage
            release-assets/**/*.sig
            release-assets/**/latest*.json
